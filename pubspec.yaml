name: incremat
description: "IncreMat Caregiver App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^1.35.3
  flutter_riverpod: ^2.6.1
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.1.4
  shared_preferences: ^2.3.5
  intl: ^0.19.0
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.4
  flutter_timezone: 5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  # path_provider_foundation >=2.4.0 added an objective_c native-asset build
  # hook that fails when the Flutter SDK path contains spaces (Windows bug).
  # Pin to the last version without that hook until the Flutter path is fixed.
  path_provider_foundation: '>=2.0.0 <2.4.0'

flutter:
  uses-material-design: true
  assets:
    - assets/images/sit_to_stand.png
    - assets/images/chair_mat.png
